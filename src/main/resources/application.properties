spring.application.name=student_data_with_photo
server.port=8081
spring.thymeleaf.cache=false 
# Configuration for MySQL Database
spring.datasource.url = jdbc:mysql://localhost:3306/spring_database
spring.datasource.username = root
spring.datasource.password = 12345678
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

# Hibernate DDL-Auto (set to update to automatically create/update tables)
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true

# Allow larger file uploads (default is 1MB, let's increase it to 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB