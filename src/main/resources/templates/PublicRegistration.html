<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elvora – Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/loginform.css}">
</head>
<body>

<div class="login-card">

    <!-- LEFT PANEL  —  Branding -->
    <div class="left-panel">

        <div class="logo">
            <div class="logo-icon">E</div>
            <span class="logo-name">Elvora</span>
        </div>

        <div class="headline">
            <h1>
                Create your <span class="accent">account!</span><br>
                Start tracking your<br>
                finances <span class="accent">today.</span>
            </h1>
            <p>Track expenses, set budgets and achieve your financial goals.</p>
        </div>

        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
    </div>

    <!-- RIGHT PANEL  —  Registration Form -->
    <div class="right-panel">

        <div class="form-header">
            <h2>Create a new account</h2>
            <p>Fill in your details to get started</p>
        </div>

        <form method="post" th:action="@{/register}" th:object="${userDto}">

            <!-- Name -->
            <div class="field-group">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="name" th:field="*{name}"
                           placeholder="Enter your full name" required/>
                </div>
            </div>

            <!-- Email -->
            <div class="field-group">
                <label for="email">Email address</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="M2 7l10 7 10-7"/>
                        </svg>
                    </span>
                    <input type="email" id="email" th:field="*{email}"
                           placeholder="Enter your email" required autocomplete="email"/>
                </div>
            </div>

            <!-- Contact -->
            <div class="field-group">
                <label for="contact">Contact Number</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.9v3a2 2 0 0 1-2.2 2A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.8.4 1.6.7 2.4a2 2 0 0 1-.4 2.1L8 9.5a16 16 0 0 0 6.5 6.5l1.3-1.3a2 2 0 0 1 2.1-.4c.8.3 1.6.5 2.4.7A2 2 0 0 1 22 16.9z"/>
                        </svg>
                    </span>
                    <input type="number" id="contact" th:field="*{contact}"
                           placeholder="Enter contact number" required/>
                </div>
            </div>

            <!-- Address -->
            <div class="field-group">
                <label for="address">Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 6-9 13-9 13S3 16 3 10a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </span>
                    <input type="text" id="address" th:field="*{address}"
                           placeholder="Enter your address" required/>
                </div>
            </div>

            <!-- Password -->
            <div class="field-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="password" th:field="*{password}"
                           placeholder="Create a password" required autocomplete="new-password"/>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-login">Sign Up</button>

        </form>

        <!-- Sign-in link -->
        <div class="signup-row">
            Already have an account?
            <a th:href="@{/login}">Login</a>
        </div>

    </div><!-- /right-panel -->

</div><!-- /login-card -->

</body>
</html>
