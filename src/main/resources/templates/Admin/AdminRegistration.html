<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Registration</title>
</head>

<body>

<h1>Admin Registration</h1>

<form method="post" action="/admin/register">

    <p>
        Admin Name
        <input type="text"
               name="adminname"
               required>
    </p>

    <p>
        Address
        <input type="text"
               name="address"
               required>
    </p>

    <p>
        Contact
        <input type="number"
               name="contact"
               required>
    </p>

    <p>
        Email
        <input type="email"
               name="email"
               required>
    </p>

    <p>
        Password
        <input type="password"
               name="password"
               required>
    </p>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
