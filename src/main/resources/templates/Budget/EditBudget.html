<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Budget – Elvora</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/UserNavbar.css}">
    <link rel="stylesheet" th:href="@{/css/UserTopbar.css}">
    <link rel="stylesheet" th:href="@{/css/UserDarkMode.css}">
    <link rel="stylesheet" th:href="@{/css/Admin/CategoryRegistration.css}">
</head>

<body>

<!-- Sidebar -->
<div th:replace="~{User/UserNavbar :: userNavbar}"></div>

<div class="admin-main">

    <!-- Topbar -->
    <div th:replace="~{User/UserTopbar :: userTopbar}"></div>

    <main class="admin-content">

        <!-- Page Header -->
        <div class="page-titles">
            <h1>Edit Monthly Budget</h1>
            <p>Update your budget limit for the selected month and year</p>
        </div>

        <!-- Layout Grid -->
        <div class="reg-layout">

            <!-- LEFT: Form Card -->
            <div class="reg-card">

                <div class="reg-card-header">
                    <div class="reg-card-icon">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </div>
                    <div>
                        <p class="reg-card-title">Edit Budget Details</p>
                        <p class="reg-card-sub">
                            For <strong th:text="${#months.monthName(budget.month)} + ' ' + ${budget.year}"></strong>
                        </p>
                    </div>
                </div>

                <!-- Form -->
                <form th:action="@{/budget/edit}" method="post" class="reg-form">

                    <input type="hidden" name="budget_id" th:value="${budget.budget_id}">

                    <!-- Budget Amount -->
                    <div class="form-group">
                        <label class="form-label">Budget Amount (₹) <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-wallet input-icon"></i>
                            <input type="number" step="0.01" name="amount" th:value="${budget.amount}" class="form-input" placeholder="e.g. 25000" required>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="form-actions">
                        <a th:href="@{/budget/show}" class="btn-cancel">Cancel</a>
                        <button type="submit" class="btn-submit">
                            <i class="fa-solid fa-check"></i>
                            Update Budget
                        </button>
                    </div>

                </form>
            </div>

            <!-- RIGHT: Illustration Panel -->
            <div class="reg-illustration-panel">
                <span class="il-dot il-dot-tl"></span>
                <span class="il-dot il-dot-tr"></span>
                <span class="il-dot il-dot-ml"></span>
                <span class="il-dot il-dot-br"></span>

                <!-- Vault SVG -->
                <svg class="il-folder-svg" viewBox="0 0 180 160" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="90" cy="140" rx="55" ry="8" fill="#c4b5f4" opacity="0.3"/>
                    <rect x="45" y="40" width="90" height="90" rx="16" fill="#a78bfa"/>
                    <rect x="52" y="47" width="76" height="76" rx="10" fill="#7c3aed"/>
                    <circle cx="90" cy="85" r="24" fill="#a78bfa" stroke="#c4b5f4" stroke-width="3"/>
                    <circle cx="90" cy="85" r="14" fill="#5b21b6"/>
                    <circle cx="90" cy="85" r="4" fill="#fde047"/>
                </svg>

                <h3 class="il-title">Budget Allocation</h3>
                <p class="il-desc">Modify your financial restrictions dynamically as your monthly goals or needs evolve.</p>

                <ul class="il-features">
                    <li>
                        <span class="il-feat-icon"><i class="fa-solid fa-piggy-bank"></i></span>
                        Prevent overspending habits
                    </li>
                    <li>
                        <span class="il-feat-icon"><i class="fa-solid fa-chart-pie"></i></span>
                        Track savings dynamically
                    </li>
                </ul>
            </div>

        </div>

    </main>
</div>

</body>
</html>
